steps:
  # Pull secrets needed at build time
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker build \
          --build-arg NEXT_PUBLIC_SUPABASE_URL=$$SUPABASE_URL \
          --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY=$$SUPABASE_ANON_KEY \
          --build-arg NEXT_PUBLIC_APP_URL=${_APP_URL} \
          -t ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${SHORT_SHA} \
          .
    secretEnv: ['SUPABASE_URL', 'SUPABASE_ANON_KEY']

  # Push image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${SHORT_SHA}']

  # Deploy to Cloud Run with runtime secrets
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE}'
      - '--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${SHORT_SHA}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=512Mi'
      - '--min-instances=0'
      - '--max-instances=3'
      - '--set-secrets=NEXT_PUBLIC_SUPABASE_URL=WP_SUPABASE_URL:latest,NEXT_PUBLIC_SUPABASE_ANON_KEY=WP_SUPABASE_ANON_KEY:latest,SUPABASE_SERVICE_ROLE_KEY=WP_SUPABASE_SERVICE_ROLE_KEY:latest,RESEND_API_KEY=WP_RESEND_API_KEY:latest'

availableSecrets:
  secretManager:
    - versionName: projects/${PROJECT_ID}/secrets/WP_SUPABASE_URL/versions/latest
      env: 'SUPABASE_URL'
    - versionName: projects/${PROJECT_ID}/secrets/WP_SUPABASE_ANON_KEY/versions/latest
      env: 'SUPABASE_ANON_KEY'

substitutions:
  _SERVICE: watch-party
  _REGION: us-central1
  _REPO: cloud-run-builds
  _APP_URL: https://watch-party-HASH.run.app  # Update after first deploy

options:
  logging: CLOUD_LOGGING_ONLY
